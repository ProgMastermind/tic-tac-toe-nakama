# Local dev: Postgres + Nakama with the compiled Go plugin.
#   docker compose -f deploy/docker-compose.yml up --build

services:
  postgres:
    image: postgres:15-alpine
    command: >
      postgres
        -c shared_preload_libraries=pg_stat_statements
        -c pg_stat_statements.track=all
    environment:
      POSTGRES_DB: nakama
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: localdb
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Compose-network only; no host port → database stays off 0.0.0.0 on laptops.
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nakama"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  nakama:
    build:
      context: ..
      dockerfile: server/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    # Each command below is on one physical line — YAML folded scalars with
    # indented continuations preserve newlines and break shell args.
    entrypoint:
      - "/bin/sh"
      - "-ecx"
      - >
        /nakama/nakama migrate up --database.address postgres:localdb@postgres:5432/nakama &&
        exec /nakama/nakama --config /nakama/data/local.yml --database.address postgres:localdb@postgres:5432/nakama
    # 7349 gRPC, 7350 WS+HTTP, 7351 console (loopback-only).
    ports:
      - "7349:7349"
      - "7350:7350"
      - "127.0.0.1:7351:7351"
    healthcheck:
      test: ["CMD", "/nakama/nakama", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  pgdata:
