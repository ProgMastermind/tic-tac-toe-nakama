# -----------------------------------------------------------------------------
# Local development stack: Postgres + Nakama (with the compiled Go plugin).
#
# Run from the repository root:
#   docker compose -f deploy/docker-compose.yml up --build
#
# The build context is the repo root so the Dockerfile at server/Dockerfile
# can reach both server/go-module and deploy/local.yml.
# -----------------------------------------------------------------------------

services:
  postgres:
    image: postgres:15-alpine
    command: >
      postgres
        -c shared_preload_libraries=pg_stat_statements
        -c pg_stat_statements.track=all
    environment:
      POSTGRES_DB: nakama
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: localdb
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Postgres is reachable only on the compose network in dev — no host
    # port is published, which keeps the database off 0.0.0.0 on developer
    # laptops without having to manage a firewall.
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nakama"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  nakama:
    build:
      context: ..
      dockerfile: server/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    # NOTE: with a YAML folded scalar (`>`), indented continuation lines
    # preserve newlines — which breaks shell commands mid-argument. Each
    # command below stays on one physical line to avoid that pitfall.
    entrypoint:
      - "/bin/sh"
      - "-ecx"
      - >
        /nakama/nakama migrate up --database.address postgres:localdb@postgres:5432/nakama &&
        exec /nakama/nakama --config /nakama/data/local.yml --database.address postgres:localdb@postgres:5432/nakama
    # 7349 gRPC API, 7350 WebSocket + HTTP API, 7351 developer console.
    # Bind the console to loopback so it's not exposed to the LAN on dev machines.
    ports:
      - "7349:7349"
      - "7350:7350"
      - "127.0.0.1:7351:7351"
    healthcheck:
      test: ["CMD", "/nakama/nakama", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  pgdata:
