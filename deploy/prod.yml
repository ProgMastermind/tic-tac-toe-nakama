# Secrets (server_key, http_key, encryption keys, console password) are NOT
# in this file — they're injected as CLI flags by heroku-entrypoint.sh from
# Heroku config vars.

name: ttt-prod
data_dir: "/nakama/data"

logger:
  # DEBUG would flood Heroku's 1500-line log buffer on the Basic dyno.
  level: "INFO"
  stdout: true

session:
  token_expiry_sec: 604800
  refresh_token_expiry_sec: 2592000

socket:
  # pong_wait (25s) sits inside Heroku's 55s router idle cap and our own
  # 30s turn timer, so thinking players don't lose the socket mid-turn.
  idle_timeout_ms: 60000
  write_wait_ms: 5000
  pong_wait_ms: 25000

match:
  input_queue_size: 128
  call_queue_size: 128
  join_attempt_queue_size: 128
  deferred_queue_size: 128
  join_marker_deadline_ms: 15000
  max_empty_sec: 30
  label_update_interval_ms: 1000
  call_timeout_ms: 500

matchmaker:
  interval_sec: 2
  max_intervals: 3

# 7351 is bound but not publicly routed — reach it via `heroku ps:forward 7351:7351`.
console:
  port: 7351
