# LOCAL development config. Every secret is a placeholder — prod.yml + Heroku
# config vars override for real deployments. Never reuse these on an exposed server.

name: ttt-local
data_dir: "./data"

logger:
  level: "INFO"
  stdout: true

runtime:
  http_key: "defaultkey"

session:
  token_expiry_sec: 604800
  refresh_token_expiry_sec: 2592000
  encryption_key: "defaultencryptionkey"
  refresh_encryption_key: "defaultrefreshencryptionkey"

socket:
  server_key: "defaultkey"
  idle_timeout_ms: 60000
  write_wait_ms: 5000
  pong_wait_ms: 25000

match:
  input_queue_size: 128
  call_queue_size: 128
  join_attempt_queue_size: 128
  deferred_queue_size: 128
  join_marker_deadline_ms: 15000
  max_empty_sec: 30
  label_update_interval_ms: 1000
  call_timeout_ms: 500

matchmaker:
  interval_sec: 2
  max_intervals: 3

console:
  port: 7351
  username: "admin"
  password: "localdev"
